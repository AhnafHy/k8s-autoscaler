replicaCount: 1

image:
  repository: k8s-autoscaler
  tag: latest
  pullPolicy: Never

service:
  type: NodePort
  port: 5000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50